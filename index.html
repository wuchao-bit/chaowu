
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送给最爱的李明飞</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        .card {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .heart-beat {
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            top: -10px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-10 left-10 w-16 h-16 rounded-full bg-pink-300 opacity-30 floating"></div>
        <div class="absolute top-1/3 right-20 w-12 h-12 rounded-full bg-purple-300 opacity-40 floating" style="animation-delay: 1s;"></div>
        <div class="absolute bottom-20 left-1/4 w-20 h-20 rounded-full bg-yellow-300 opacity-20 floating" style="animation-delay: 2s;"></div>
    </div>

    <div class="w-full max-w-md bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl overflow-hidden z-10">
        <!-- 头部 -->
        <div class="bg-gradient-to-r from-pink-500 to-purple-600 p-6 text-center">
            <h1 class="text-3xl font-bold text-white floating">🎂 生日快乐！</h1>
            <p class="text-white/90 mt-2">献给我最爱的李明飞</p>
        </div>
        
        <!-- 主体内容 -->
        <div class="p-6">
            <!-- 生日蛋糕 -->
            <div class="text-center mb-6">
                <div class="w-32 h-32 mx-auto mb-4 floating heart-beat">
                    <div class="w-full h-full bg-gradient-to-b from-yellow-300 to-yellow-500 rounded-full relative">
                        <div class="absolute top-0 left-0 w-full h-1/3 bg-gradient-to-b from-pink-300 to-pink-500 rounded-t-full"></div>
                        <div class="absolute top-1/3 left-1/2 transform -translate-x-1/2 w-2 h-2 bg-red-500 rounded-full"></div>
                        <div class="absolute top-1/4 left-1/4 w-2 h-2 bg-red-500 rounded-full"></div>
                        <div class="absolute top-1/4 right-1/4 w-2 h-2 bg-red-500 rounded-full"></div>
                    </div>
                </div>
                <p class="text-gray-700 text-lg">亲爱的李明飞：</p>
                <p class="text-gray-600 mt-2 italic">愿你的每一天都像今天一样美好！</p>
            </div>
            
            <!-- 祝福卡片 -->
            <div class="bg-gradient-to-r from-pink-50 to-purple-50 border-l-4 border-pink-500 p-4 rounded-lg mb-6 card">
                <p class="text-gray-700">感谢你让我的世界如此精彩，愿我们携手走过更多美好的岁月。你是世界上最好的妻子，我永远爱你！</p>
            </div>
            
            <!-- 互动按钮 -->
            <div class="space-y-4 mb-6">
                <button onclick="showSurprise()" class="w-full bg-gradient-to-r from-pink-500 to-purple-500 text-white py-3 rounded-lg font-medium hover:from-pink-600 hover:to-purple-600 transition transform hover:-translate-y-1 flex items-center justify-center">
                    <i class="fas fa-gift mr-2"></i>点击收礼物
                </button>
                
                <button onclick="sendMessage()" class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 text-white py-3 rounded-lg font-medium hover:from-blue-600 hover:to-cyan-600 transition transform hover:-translate-y-1 flex items-center justify-center">
                    <i class="fas fa-paper-plane mr-2"></i>发送爱意
                </button>
                
                <button onclick="createWish()" class="w-full bg-gradient-to-r from-green-500 to-teal-500 text-white py-3 rounded-lg font-medium hover:from-green-600 hover:to-teal-600 transition transform hover:-translate-y-1 flex items-center justify-center">
                    <i class="fas fa-star mr-2"></i>许个愿望
                </button>
            </div>
            
            <!-- 许愿记录 -->
            <div id="wishContainer" class="hidden">
                <h3 class="text-lg font-semibold text-gray-700 mb-2">许愿记录</h3>
                <div id="wishList" class="space-y-2"></div>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="bg-gray-50 p-4 text-center text-gray-500 text-sm">
            <p>♥ 2026年专属生日祝福 ♥</p>
        </div>
    </div>

    <!-- 惊喜弹窗 -->
    <div id="surpriseModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="text-2xl font-bold text-pink-500 mb-4 text-center">🎉 特别惊喜</h2>
            <div class="text-center">
                <div class="w-20 h-20 bg-gradient-to-br from-yellow-400 to-pink-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-heart text-white text-2xl"></i>
                </div>
                <p class="text-gray-700 mb-4">你是全世界最棒的妻子！愿你永远年轻漂亮，开心快乐！我爱你胜过一切！</p>
                <button onclick="shareToWechat()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">
                    <i class="fab fa-weixin mr-2"></i>分享到微信
                </button>
            </div>
        </div>
    </div>

    <!-- 许愿弹窗 -->
    <div id="wishModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full relative">
            <button onclick="closeWishModal()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="text-2xl font-bold text-green-500 mb-4 text-center">✨ 许个愿望</h2>
            <textarea id="wishInput" placeholder="写下你的生日愿望..." class="w-full h-24 p-3 border rounded-lg mb-4"></textarea>
            <button onclick="saveWish()" class="w-full bg-green-500 text-white py-3 rounded-lg font-medium hover:bg-green-600 transition">
                保存愿望
            </button>
        </div>
    </div>

    <script>
        // 创建彩带效果
        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }

        // 显示惊喜
        function showSurprise() {
            document.getElementById('surpriseModal').classList.remove('hidden');
            createConfetti();
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('surpriseModal').classList.add('hidden');
        }

        // 发送爱意
        function sendMessage() {
            const messages = [
                "李明飞，生日快乐！你是我的唯一！",
                "最爱的明飞，愿你今天超级开心！",
                "明飞宝贝，祝你生日快乐，天天开心！",
                "亲爱的，感谢你一直以来的陪伴，生日快乐！",
                "愿我的爱能让你每天都像过生日一样快乐！"
            ];
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            alert("💌 爱的告白：\n\n" + randomMessage);
        }

        // 创建许愿
        function createWish() {
            document.getElementById('wishModal').classList.remove('hidden');
        }

        // 关闭许愿弹窗
        function closeWishModal() {
            document.getElementById('wishModal').classList.add('hidden');
        }

        // 保存愿望
        function saveWish() {
            const wishInput = document.getElementById('wishInput');
            const wishText = wishInput.value.trim();
            
            if (wishText) {
                const wishes = JSON.parse(localStorage.getItem('birthdayWishes') || '[]');
                wishes.push({
                    id: Date.now(),
                    text: wishText,
                    date: new Date().toLocaleString()
                });
                localStorage.setItem('birthdayWishes', JSON.stringify(wishes));
                
                wishInput.value = '';
                closeWishModal();
                loadWishes();
                alert('愿望已保存！');
            } else {
                alert('请先写下你的愿望哦~');
            }
        }

        // 加载愿望
        function loadWishes() {
            const wishes = JSON.parse(localStorage.getItem('birthdayWishes') || '[]');
            const wishContainer = document.getElementById('wishContainer');
            const wishList = document.getElementById('wishList');
            
            if (wishes.length > 0) {
                wishContainer.classList.remove('hidden');
                wishList.innerHTML = '';
                
                wishes.slice(-3).reverse().forEach(wish => {
                    const wishElement = document.createElement('div');
                    wishElement.className = 'bg-gray-50 p-3 rounded-lg';
                    wishElement.innerHTML = `
                        <p class="text-gray-700">${wish.text}</p>
                        <p class="text-gray-500 text-sm mt-1">${wish.date}</p>
                    `;
                    wishList.appendChild(wishElement);
                });
            } else {
                wishContainer.classList.add('hidden');
            }
        }

        // 分享到微信
        function shareToWechat() {
            if (navigator.share) {
                navigator.share({
                    title: '生日祝福',
                    text: '送给最爱的李明飞的生日祝福',
                    url: window.location.href
                }).catch(console.error);
            } else {
                alert('请在微信中打开此页面进行分享');
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadWishes();
        });

        // 点击弹窗外部关闭
        document.addEventListener('click', function(e) {
            if (e.target.id === 'surpriseModal') {
                closeModal();
            }
            if (e.target.id === 'wishModal') {
                closeWishModal();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>索尔赫门窗 - 生意兴隆 财源广进</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffd700, #f59e0b, #b45309);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "微软雅黑", "华文琥珀", sans-serif;
            overflow: hidden;
        }

        /* 主祝福容器 */
        .blessing-box {
            text-align: center;
            padding: 60px 100px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.8);
            position: relative;
            animation: float 4s ease-in-out infinite;
            border: 4px solid #d97706;
        }

        /* 品牌名称样式 */
        .brand-name {
            font-size: 52px;
            color: #78350f;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #fbbf24;
            animation: brandShine 3s ease-in-out infinite alternate;
            position: relative;
        }

        /* 品牌名装饰（门窗元素） */
        .brand-name::before {
            content: "🚪";
            position: absolute;
            left: -60px;
            top: -10px;
            font-size: 40px;
            animation: doorRotate 5s linear infinite;
        }

        .brand-name::after {
            content: "🪟";
            position: absolute;
            right: -60px;
            top: -10px;
            font-size: 40px;
            animation: windowFloat 5s ease-in-out infinite;
        }

        /* 核心祝福语 */
        .main-blessing {
            font-size: 36px;
            color: #b91c1c;
            margin: 30px 0;
            line-height: 1.8;
            text-shadow: 1px 1px 3px #ffd700;
            animation: blessingScroll 4s ease-in-out infinite alternate;
        }

        /* 辅助祝福语 */
        .sub-blessing {
            font-size: 28px;
            color: #1e40af;
            margin-top: 10px;
            animation: fadeIn 2s ease-out infinite alternate;
        }

        /* 装饰元素 - 金币 */
        .coin {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #ffd700;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            color: #b91c1c;
            font-weight: bold;
            font-size: 18px;
            animation: coinFall linear infinite;
            z-index: 1;
        }

        /* 装饰元素 - 元宝 */
        .ingot {
            position: absolute;
            font-size: 35px;
            animation: ingotFloat 4s ease-in-out infinite;
        }

        /* 关键帧动画定义 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes brandShine {
            0% { text-shadow: 2px 2px 4px #fbbf24; }
            100% { text-shadow: 2px 2px 15px #f59e0b, 0 0 30px #ffd700; }
        }

        @keyframes doorRotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes windowFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes blessingScroll {
            0% { transform: translateX(-15px); }
            100% { transform: translateX(15px); }
        }

        @keyframes fadeIn {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        @keyframes coinFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(700px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes ingotFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
</head>
<body>
    <div class="blessing-box">
        <div class="brand-name">索尔赫门窗</div>
        <div class="main-blessing">
            生意兴隆 🎊 财源广进 💰<br>
            客似云来 📈 蒸蒸日上 🚀
        </div>
        <div class="sub-blessing">愿大展宏图，门窗事业节节高！</div>
        
        <!-- 元宝装饰 -->
        <div class="ingot" style="left: 30px; bottom: 30px; animation-delay: 0s;">💰</div>
        <div class="ingot" style="right: 30px; top: 30px; animation-delay: 1s;">🏮</div>
        <div class="ingot" style="left: 60px; top: 60px; animation-delay: 2s;">🎁</div>
    </div>

    <script>
        // 动态生成掉落的金币，增强招财氛围
        function createCoins() {
            const body = document.body;
            const coinCount = 25; // 金币数量
            const coins = ['¥', '$', '💰'];

            for (let i = 0; i < coinCount; i++) {
                const coin = document.createElement('div');
                coin.className = 'coin';
                coin.textContent = coins[Math.floor(Math.random() * coins.length)];
                
                // 随机位置、大小和动画时长
                coin.style.left = `${Math.random() * 100}vw`;
                coin.style.animationDuration = `${6 + Math.random() * 4}s`;
                coin.style.animationDelay = `${Math.random() * 5}s`;
                coin.style.fontSize = `${14 + Math.random() * 8}px`;
                
                body.appendChild(coin);

                // 金币落地后移除，避免DOM堆积
                setTimeout(() => {
                    coin.remove();
                }, 12000);
            }
        }

        // 页面加载后启动金币动画，循环生成
        window.onload = () => {
            createCoins();
            setInterval(createCoins, 8000);
        };
    </script>
</body>
</html>

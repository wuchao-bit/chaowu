<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马年祝福 - 雄康 雄超 瑞东 浩博</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(120deg, #ffd700, #ff8c00, #e63946);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "微软雅黑", "华文琥珀", sans-serif;
            overflow: hidden;
        }

        .blessing-container {
            text-align: center;
            position: relative;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
            animation: containerFloat 3s ease-in-out infinite;
        }

        /* 标题动画 */
        .main-title {
            font-size: 36px;
            color: #d62828;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #ffd700;
            animation: titleShine 2s ease-in-out infinite alternate;
        }

        /* 名字列表动画 */
        .name-list {
            font-size: 28px;
            color: #003566;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .name-item {
            padding: 10px 15px;
            background: #ffd700;
            border-radius: 10px;
            animation: nameBounce 2s ease-in-out infinite;
        }

        /* 每个名字延迟动画，更有层次感 */
        .name-item:nth-child(1) { animation-delay: 0s; }
        .name-item:nth-child(2) { animation-delay: 0.3s; }
        .name-item:nth-child(3) { animation-delay: 0.6s; }
        .name-item:nth-child(4) { animation-delay: 0.9s; }

        /* 祝福语动画 */
        .blessing-text {
            font-size: 32px;
            color: #ff6b00;
            margin-top: 20px;
            text-shadow: 1px 1px 3px #fff;
            animation: blessingScroll 3s linear infinite alternate;
        }

        /* 装饰元素 - 金币动画 */
        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ffd700;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            color: #d62828;
            font-weight: bold;
            animation: coinFall linear infinite;
        }

        /* 装饰元素 - 小马图标 */
        .horse {
            position: absolute;
            font-size: 40px;
            animation: horseRun 8s linear infinite;
        }

        /* 关键帧动画定义 */
        @keyframes containerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes titleShine {
            0% { text-shadow: 2px 2px 4px #ffd700; }
            100% { text-shadow: 2px 2px 10px #ff8c00, 0 0 20px #ffd700; }
        }

        @keyframes nameBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes blessingScroll {
            0% { transform: translateX(-10px); }
            100% { transform: translateX(10px); }
        }

        @keyframes coinFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(600px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes horseRun {
            0% {
                left: -100px;
                top: 20px;
                transform: scaleX(1);
            }
            48% { transform: scaleX(1); }
            50% {
                left: calc(100% + 50px);
                top: 20px;
                transform: scaleX(1);
            }
            52% { transform: scaleX(-1); }
            100% {
                left: -100px;
                top: 20px;
                transform: scaleX(-1);
            }
        }
    </style>
</head>
<body>
    <div class="blessing-container">
        <h1 class="main-title">🐴 马年大吉 🐴</h1>
        <div class="name-list">
            <span class="name-item">雄康</span>
            <span class="name-item">雄超</span>
            <span class="name-item">瑞东</span>
            <span class="name-item">浩博</span>
        </div>
        <p class="blessing-text">马年行大运 🚀 一路发发发 💰</p>
        <div class="horse">🐎</div>
    </div>

    <script>
        // 动态生成掉落的金币效果
        function createCoins() {
            const container = document.querySelector('.blessing-container');
            const coinCount = 20; // 金币数量

            for (let i = 0; i < coinCount; i++) {
                const coin = document.createElement('div');
                coin.className = 'coin';
                coin.textContent = '¥';
                // 随机位置和动画时长
                coin.style.left = `${Math.random() * 100}vw`;
                coin.style.animationDuration = `${5 + Math.random() * 5}s`;
                coin.style.animationDelay = `${Math.random() * 5}s`;
                document.body.appendChild(coin);

                // 金币落地后移除，避免DOM堆积
                setTimeout(() => {
                    coin.remove();
                }, 10000);
            }
        }

        // 页面加载后启动金币动画，并且循环生成
        window.onload = () => {
            createCoins();
            setInterval(createCoins, 8000);
        };
    </script>
</body>
</html>
